<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
}

form{
width:350px;
margin:50px auto;
padding:20px;
background:white;
border-radius:10px;
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
}

button{
background:green;
color:white;
padding:10px;
border:none;
width:100%;
}
</style>
</head>

<body>

<form action="insert.php" method="post">

<h2>Student Registration</h2>

Name:
<input type="text" name="name" required>

Email:
<input type="email" name="email" required>

DOB:
<input type="date" name="dob" required>

Department:
<select name="department">
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
<option>EEE</option>
</select>

Phone:
<input type="text" name="phone" required>

<button type="submit">Register</button>

</form>

</body>
</html>
